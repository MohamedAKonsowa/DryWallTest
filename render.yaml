services:
  - type: web
    name: pro-drywall
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    domains:
      - louisvilledrywallpaints.com
      - www.louisvilledrywallpaints.com
      - drywall-contractors.org
      - www.drywall-contractors.org
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: CONTACT_EMAIL
        value: info@drywall-contractors.org
      - key: SITE_URL
        value: https://louisvilledrywallpaints.com
      - key: PRIMARY_DOMAIN
        value: louisvilledrywallpaints.com
      - key: SECONDARY_DOMAIN
        value: drywall-contractors.org
      - key: CONTACT_PHONE
        value: "+1 5025462608"
      - key: WEB3FORMS_ACCESS_KEY
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
